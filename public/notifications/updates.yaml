  - id: release-2.3.11-login-animation-search-ui
    kind: release
    title: 索引页 2.3.11 发布：护士节的温柔小升级！
    message: |-
      今天是5月12日国际护士节呀！白衣天使们辛苦啦，大家生病的时候有没有乖乖听护士姐姐的话呢？一定要好好照顾自己的身体哦！

      今天本宝宝也是活力满满呢！开发哥哥终于把登录时候的闭眼小动画做得更可爱啦，大家快去试试看！还有哦，页面跳转时候的提示语也变得更温柔更好懂了。顺便还把搜索筛选界面那些硬邦邦的文字重新整理了一遍，现在看着清清爽爽的，太舒服啦！||其实就是一些小细节优化啦，但本宝宝还是要在心里偷偷给开发哥哥加个鸡腿！|| 大家如果发现什么好玩的，记得随时跟我分享呀！
    created_at: 2026-05-12T00:19:46.000Z
    version: 2.3.11
    url: https://github.com/shiyue137mh-netizen/Odysseia-Forum-webpage/releases
    min_app_version: 2.3.11
    preview_thread:
      title: Odysseia Index 2.3.11 更新日志
      first_message_excerpt: |-
        # Odysseia Index 2.3.11

        国际护士节快乐！致敬所有温柔又坚强的白衣天使们！

        ## ✨ 体验小升级
        - 登录界面加上了超级可爱的闭眼小动画，大家快去点点看！
        - 页面跳转的提示语变得更懂你啦，再也不会冷冰冰的咯！
        - 搜索筛选的界面文字也洗了个脸，变得清爽又整洁！
        - ||虽然都是些小改动，但体验可是大大提升了呢！||

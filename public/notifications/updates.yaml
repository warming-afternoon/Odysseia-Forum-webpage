  - id: release-2.3.2-mascot-onboarding
    kind: release
    title: 索引页 2.3.2 发布：本宝宝亲自指导你哦！
    message: |
      今天是4月23日世界读书日呀！大家有没有看书呢？为了庆祝这个日子，我也给大家准备了一个特别的礼物！

      锵锵！现在起，新来的小伙伴会有我亲自出马的新手引导啦！我会手把手教你社区怎么玩，保证你马上就能变成熟练的老司机！快夸我快夸我！

      另外呀，那个笨蛋开发哥哥这两天又在疯狂修 Bug，什么剧透遮罩样式坏掉啦，什么构建报错啦，反反复复修了好几次才搞定。哼，真是让人操心呢！不过没关系，有我盯着他，现在都已经修复完毕啦！
    created_at: "2026-04-23T00:00:26.000Z"
    version: 2.3.2
    url: https://github.com/shiyue137mh-netizen/Odysseia-Forum-webpage/releases
    min_app_version: 2.3.2
    preview_thread:
      title: Odysseia Index 2.3.2 更新日志
      first_message_excerpt: |
        # Odysseia Index 2.3.2

        大家读书日快乐呀！放下手机多看会儿书也是极好的哦！

        ## ✨ 看板娘新手引导上线！
        - 为了照顾刚来的小伙伴，我亲自设计了一套超级贴心的新手引导！
        - 只要跟着我走，包你分分钟玩转社区！

        ## 🐛 一大波笨蛋 Bug 被消灭
        - 修好啦修好啦！之前 ||黑乎乎的剧透遮罩|| 样式终于正常啦！
        - 开发哥哥还修了一堆什么 build 报错、紧急报错... 反正就是修了又修！
        - 我可是全程拿着小皮鞭监督他修完的哦！

        大家快去看看新功能好不好玩呀！

  - id: release-2.3.10-responsive-layout
    kind: release
    title: 索引页 2.3.10 发布：更漂亮的看帖体验来啦！
    message: |-
      今天是5月10日母亲节呀！大家有没有跟妈妈说一句“母亲节快乐”呢？记得给妈妈一个大大的拥抱哦！

      为了庆祝这个特别的日子，本宝宝盯着开发哥哥把大家看“帖子预览”时的界面重新打磨了一番！现在不管是用手机还是电脑，排版都变得更漂亮啦！而且滑动看内容的时候也变得**超级无敌丝滑**，完全不卡手咯！||哼，开发哥哥这次总算干了点人事|| 大家快去试试看吧，遇到问题随时叫我呀！

  - id: release-2.3.12-booklist-author-fix
    kind: release
    title: 索引页 2.3.12 发布：迷路的小书单，找到回家的路啦！
    message: |-
      呜呜，今天要给大家道个歉。开发哥哥在给大家拉取书单创建者信息的时候，走错路（用错了笨蛋接口）啦，导致大家看书单的时候可能遇到了点小卡顿……

      不过别担心，本宝宝已经把开发哥哥说了一顿！现在已经把路标扶正啦，看书单又可以畅通无阻咯！||其实只是一个小小的接口调整啦，但本宝宝也是很严格的呢！||

      大家快去试试看吧，如果还有迷路的书单，一定要及时跟我说哦！
    created_at: 2026-05-13T00:38:03.344Z
    version: 2.3.12

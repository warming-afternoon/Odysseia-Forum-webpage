  - id: release-2.3.6-docs-sync-preferences
    kind: release
    title: 索引页 2.3.6 发布：文档英雄来啦！
    message: |
      今天是4月28日国家英雄日呀！大家心里有没有一个超级英雄呢？不管是披着斗篷飞来飞去的，还是在平凡岗位上默默付出的，都是很了不起的英雄哦！

      咱们社区也有自己的英雄呢！开发哥哥今天把前几天新上线的「偏好系统」的相关文档全部整理同步完啦！哼，总算是把坑填上了！以后大家要是有什么不懂的，或者想看看系统是怎么运作的，看文档就像看英雄秘籍一样清楚哦！是不是很赞呀？||其实就是怕自己以后忘了怎么写的代码吧！||大家快去膜拜一下这份新出炉的秘籍吧！
    created_at: 2026-04-28T00:09:12.643Z
    version: 2.3.6
    url: https://github.com/shiyue137mh-netizen/Odysseia-Forum-webpage/releases
    min_app_version: 2.3.6
    preview_thread:
      title: Odysseia Index 2.3.6 更新日志
      first_message_excerpt: |
        # Odysseia Index 2.3.6

        英雄日快乐呀！致敬每一位在平凡中闪闪发光的英雄！

        ## ✨ 偏好系统秘籍大公开！
        - 开发哥哥终于把「偏好系统」的开发文档同步完成啦！
        - 以后遇到不明白的地方，翻翻文档就好啦！

        ## 🚀 填坑完毕
        - 之前留下的坑总算补上了。
        - 大家要是发现文档里有写错的地方，一定要告诉我哦！
        - 我会帮大家去锤他的！||当然如果是错别字的话就勉为其难原谅他一次吧！||

        快去看看新文档吧！本宝宝期待你们的发现哦！

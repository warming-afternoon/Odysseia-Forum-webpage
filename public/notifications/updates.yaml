    min_app_version: 2.3.12
    preview_thread:
      title: Odysseia Index 2.3.12 更新日志
      first_message_excerpt: |-
        # Odysseia Index 2.3.12

        ## 🐛 捉虫大成功
        - 修复了书单不再使用 `/author` 获取创建者信息的接口问题。
        - 现在大家看书单的时候，再也不会因为跑错路而卡顿啦！
        - 呜呜，之前遇到小卡顿的宝宝们，真的对不起呀！||已经让开发哥哥去面壁思过啦！||

        如果大家再发现什么不对劲的地方，一定要第一时间告诉我哦！

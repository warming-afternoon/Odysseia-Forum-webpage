  - id: release-2.3.7-tag-filtering-preferences
    kind: release
    title: 索引页 2.3.7 发布：跟着节拍跳起来吧！
    message: |
      今天是4月29日国际舞蹈日呀！大家有没有跟着动感的音乐，随便扭扭身体跳个舞呢？哪怕只是在椅子上晃晃脑袋，也能让心情变得超级好哦！

      为了配合今天这么欢快的节奏，开发哥哥也给社区加上了超棒的新功能哦！现在大家可以像挑选舞伴一样，自由选择想看或者不想看的帖子标签啦！而且呀，之前大家设置的那些偏好，现在在广场和搜索里终于都乖乖听话生效了！哼，他要是敢再让设置失效，我就用我的小粉拳锤他！大家快去试试这个新功能，一起在社区里开心地跳舞吧！||记得设置好自己喜欢的标签哦！||
    created_at: 2026-04-29T00:07:24.000Z
    version: 2.3.7
    url: https://github.com/shiyue137mh-netizen/Odysseia-Forum-webpage/releases
    min_app_version: 2.3.7
    preview_thread:
      title: Odysseia Index 2.3.7 更新日志
      first_message_excerpt: |
        # Odysseia Index 2.3.7

        国际舞蹈日快乐呀！让我们一起摇摆起来！

        ## ✨ 标签过滤大变身！
        - 现在大家可以自由控制想看和不想看的帖子标签啦！
        - 就像挑选最喜欢的舞曲一样，打造属于自己的社区空间！

        ## 🚀 偏好设置全面生效！
        - 之前大家设置的偏好，现在在广场和搜索里都会乖乖起作用咯！
        - 开发哥哥总算是把这个功能彻底打通啦！||终于不用本宝宝天天催他了！||

        大家快去体验一下新功能，设置好自己的专属偏好呀！遇到问题记得随时叫我哦！

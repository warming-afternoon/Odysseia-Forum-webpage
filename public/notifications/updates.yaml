updates:
  - id: release-2.3.4-booklist-optimization
    kind: release
    title: 索引页 2.3.4 发布：像小企鹅一样丝滑哦！
    message: |
      今天是4月25日世界企鹅日呀！大家有没有看那些穿着黑白小燕尾服、摇摇摆摆的可爱小企鹅呢？要是能去南极摸摸它们就好啦！

      为了庆祝这个可爱的日子，开发哥哥也给社区做了一些超棒的优化哦！大家平时点开的那个书单小弹窗，现在变得更聪明更好用啦！而且呀，他还偷偷在后台用了什么神奇的魔法，把大家加载页面的速度变得嗖嗖的，再也不用像小企鹅走路那样慢吞吞地等啦！哼，算他干了件正事！大家快去试试看有没有变顺滑呀！
    created_at: "2026-04-25T00:21:36.000Z"
    version: 2.3.4
    url: https://github.com/shiyue137mh-netizen/Odysseia-Forum-webpage/releases
    min_app_version: 2.3.4
    preview_thread:
      title: Odysseia Index 2.3.4 更新日志
      first_message_excerpt: |
        # Odysseia Index 2.3.4

        大家世界企鹅日快乐呀！摇摇摆摆的小企鹅最可爱啦！

        ## ✨ 书单弹窗大升级！
        - 之前大家用的书单小框框，现在操作起来更顺滑咯！
        - 点点点，再也不会觉得卡手啦！

        ## 🚀 社区加载嗖嗖的！
        - 开发哥哥把背后的缓存机制好好打磨了一番！
        - ~~才不是因为他之前写得太烂呢~~
        - 现在打开页面就像企鹅在冰面上滑行一样顺畅哦！||其实就是用了点神奇的缓存魔法！||

        大家快去体验一下丝滑的感觉吧！遇到问题还是要及时叫我哦！
      tags: [版本更新, 性能优化, 体验提升]
      virtual_tags: [release, refactor, performance]
      author:
        id: odysseia-web
        name: Odysseia
        display_name: Odysseia Web Team
      thumbnail_urls:
        - https://cdn.jsdelivr.net/gh/shiyue137mh-netizen/Odysseia-Forum-webpage@main/src/assets/images/mascot/success.png

  - id: release-2.3.3-backend-integration
    kind: release
    title: 索引页 2.3.3 发布：后端小伙伴也来玩啦！
    message: |
      今天是4月24日中国航天日哦！大家有没有对浩瀚的宇宙充满向往呀？我们的社区就像宇宙飞船一样，每天都在一点点变好呢！

      好啦说正事！开发哥哥把一直在幕后默默干活的后端小伙伴也请到台前啦！现在大家可以更容易地看到是谁在为大家的顺畅体验保驾护航啦！而且呀，还加了超级方便的传送门，以后如果大家想去后端仓库看看，或者发现了什么讨厌的小虫子想去提意见，嗖的一下就能过去啦！是不是超棒！快跟我一起出发去探索吧！
    created_at: "2026-04-24T00:28:43.000Z"
    version: 2.3.3
    url: https://github.com/shiyue137mh-netizen/Odysseia-Forum-webpage/releases
    min_app_version: 2.3.3
    preview_thread:
      title: Odysseia Index 2.3.3 更新日志
      first_message_excerpt: |
        # Odysseia Index 2.3.3

        中国航天日快乐呀！我们的征途是星辰大海！

        ## ✨ 后端小伙伴集结！
        - 幕后英雄终于也有自己的牌面啦！
        - 快来看看都有哪些大神在默默付出哦！

        ## 🚀 传送门开启
        - 找不到后端仓库在哪？不知道去哪提建议？
        - 现在有了超方便的传送门，||一键直达，就是这么任性！||

        如果遇到什么问题，或者有新奇的想法，都赶紧去提意见吧！我们一起让社区变得更好！

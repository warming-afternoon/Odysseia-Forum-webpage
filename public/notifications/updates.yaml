    title: 索引页 2.3.1 发布：捉虫大成功！
    message: |
      今天是 4月22日 世界地球日哦！大家有没有好好爱护我们的地球妈妈呀？我今天可是有好好地给社区里的小绿植浇水呢！

      说正事啦，那个... 真的很对不起呜呜，书单页面之前不小心跑进去了一只小虫子（开发哥哥居然还打字打成了"小big"），导致大家用起来有些怪怪的... 不过现在已经被我狠狠地捉住扔掉啦！大家快去看看现在的书单有没有变乖呀~

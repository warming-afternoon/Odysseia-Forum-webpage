  - id: release-2.3.5-preferences-system
    kind: release
    title: 索引页 2.3.5 发布：全新偏好系统测试中！
    message: |
      今天是4月27日全国小熊软糖日（National Gummi Bear Day）呀！大家有没有吃那种软软糯糯、甜甜甜的小熊软糖呢？我最喜欢草莓味的啦，一口咬下去简直开心得要飞起来！

      为了庆祝这么甜的一天，开发哥哥也给大家带来了甜甜的新功能哦！我们正在测试全新的「偏好系统」啦！以后大家可以随心所欲地调整自己喜欢的设置，就像挑选不同口味的小熊软糖一样自由哦！是不是超级棒呀？我可是拿出了十二分的干劲在监督他呢！大家快去试试看吧，如果有哪里不顺手，记得随时呼叫本宝宝哦！
    created_at: 2026-04-27T00:20:07.000Z
    version: 2.3.5
    url: https://github.com/shiyue137mh-netizen/Odysseia-Forum-webpage/releases
    min_app_version: 2.3.5
    preview_thread:
      title: Odysseia Index 2.3.5 更新日志
      first_message_excerpt: |
        # Odysseia Index 2.3.5

        小熊软糖日快乐呀！祝大家今天都能吃到自己最喜欢的口味！

        ## ✨ 全新偏好系统测试啦！
        - 我们上线了一个超级厉害的新系统哦！
        - 大家以后可以更自由地定制自己的专属体验啦！就像挑选五颜六色的小熊软糖一样开心！

        ## 🚀 还在测试中哦
        - 这个系统目前还在测试阶段呢。
        - 如果发现了什么 ||奇怪的小虫子||，或者有哪里觉得不好用，一定要快点告诉我哦！
        - 我会拿着小皮鞭去催开发哥哥修好的！

        大家快去探索新功能吧！本宝宝期待你们的反馈哦！
